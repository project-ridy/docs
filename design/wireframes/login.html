<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>Ridy Wireframe - Login</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Pretendard Variable', sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
:root { --primary: #2563EB; --primary-light: #3B82F6; --gray-300: #D1D5DB; --gray-500: #6B7280; --gray-900: #111827; --kakao: #FEE500; }
.phone { width: 390px; height: 844px; background: #fff; display: flex; flex-direction: column; }
.status-bar { display: flex; justify-content: space-between; padding: 14px 32px 0; font-size: 15px; font-weight: 600; color: var(--gray-900); }
.content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 24px; }
.logo-icon { font-size: 72px; margin-bottom: 12px; }
.logo-text { font-size: 40px; font-weight: 800; color: var(--primary); letter-spacing: -1px; }
.logo-sub { font-size: 18px; color: var(--gray-500); margin-top: 6px; margin-bottom: 56px; }
.social-buttons { width: 100%; display: flex; flex-direction: column; gap: 14px; margin-bottom: 28px; }
.btn-social { height: 54px; border-radius: 14px; border: none; font-size: 17px; font-weight: 600; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn-kakao { background: var(--kakao); color: #191919; }
.btn-google { background: #fff; color: var(--gray-900); border: 1.5px solid var(--gray-300); }
.btn-apple { background: #191919; color: #fff; }
.login-hint { font-size: 14px; color: var(--gray-500); text-align: center; }
.home-indicator { width: 134px; height: 5px; background: var(--gray-900); border-radius: 3px; margin: 8px auto 10px; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span>●●● 🔋</span></div>
  <div class="content">
    <div class="logo-icon">🚗</div>
    <div class="logo-text">Ridy</div>
    <div class="logo-sub">함께 타는 길</div>
    <div class="social-buttons">
      <button class="btn-social btn-kakao">💬 카카오 로그인</button>
      <button class="btn-social btn-google">🔗 구글 로그인</button>
      <button class="btn-social btn-apple">🍎 Apple 로그인</button>
    </div>
    <div class="login-hint">회원가입 없이 소셜 계정으로 바로 시작</div>
  </div>
  <div class="home-indicator"></div>
</div>
</body>
</html>
